name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag omg/mdsa:latest

    - name: Run the Docker container
      run: docker run --rm -v "$(pwd):/source" omg/mdsa:latest

    - name: Check container status
      run: docker ps -a
